<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Claude Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #667eea;
      margin-bottom: 20px;
      text-align: center;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin: 8px 0;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .quick-btn {
      background: #f0f0f0;
      color: #333;
      padding: 8px 16px;
      margin: 4px;
      width: auto;
      display: inline-block;
      font-size: 14px;
    }
    .quick-btn:hover {
      background: #667eea;
      color: white;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      min-height: 100px;
      white-space: pre-wrap;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      margin: 10px 0;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    .step {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin: 10px 0;
      border-left: 4px solid #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Claude Assistant</h1>
    
    <div class="step">
      <h3>⚙️ Step 1: Setup API Key</h3>
      <p style="margin: 10px 0;">Get your key from <a href="https://console.anthropic.com" style="color: #667eea;">Anthropic Console</a></p>
      <input type="password" id="apiKey" placeholder="Enter your Claude API key (sk-ant-...)">
      <button onclick="saveKey()">Save API Key</button>
      <div id="keyStatus"></div>
    </div>
    
    <div class="step">
      <h3>📋 Step 2: Get Your Text</h3>
      <p style="margin: 10px 0;">Copy any text from anywhere (⌘+C), then click:</p>
      <button onclick="getClipboard()">Get Copied Text</button>
      <div id="clipboardPreview" style="margin-top: 10px; padding: 10px; background: white; border-radius: 6px; display: none;"></div>
    </div>
    
    <div class="step">
      <h3>✨ Step 3: Choose Action</h3>
      <div style="margin: 10px 0;">
        <button class="quick-btn" onclick="setPrompt('Rewrite this in clear, native English:')">📝 Rewrite</button>
        <button class="quick-btn" onclick="setPrompt('Summarize in 2-3 sentences:')">📊 Summarize</button>
        <button class="quick-btn" onclick="setPrompt('Fix grammar and spelling:')">✏️ Fix Grammar</button>
        <button class="quick-btn" onclick="setPrompt('Make more professional:')">💼 Professional</button>
      </div>
      <textarea id="prompt" rows="3" placeholder="Or write your own prompt...">Rewrite this in clear, native English:</textarea>
    </div>
    
    <button onclick="processText()" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">
      🚀 Process with Claude
    </button>
    
    <div id="result"></div>
    <button id="copyBtn" onclick="copyResult()" style="display: none;">📋 Copy Result</button>
  </div>
  
  <script>
    const { clipboard } = require('electron');
    let currentText = '';
    let resultText = '';
    
    // Load saved API key
    window.onload = () => {
      const saved = localStorage.getItem('apiKey');
      if (saved) {
        document.getElementById('apiKey').value = saved;
        document.getElementById('keyStatus').innerHTML = '<div class="status success">✅ API key configured</div>';
      }
    };
    
    function saveKey() {
      const key = document.getElementById('apiKey').value;
      if (!key.startsWith('sk-ant-')) {
        document.getElementById('keyStatus').innerHTML = '<div class="status error">Invalid key format</div>';
        return;
      }
      localStorage.setItem('apiKey', key);
      document.getElementById('keyStatus').innerHTML = '<div class="status success">✅ API key saved!</div>';
    }
    
    function getClipboard() {
      currentText = clipboard.readText();
      if (!currentText) {
        alert('No text in clipboard! Copy some text first (⌘+C)');
        return;
      }
      const preview = document.getElementById('clipboardPreview');
      preview.style.display = 'block';
      preview.textContent = currentText.substring(0, 200) + (currentText.length > 200 ? '...' : '');
    }
    
    function setPrompt(p) {
      document.getElementById('prompt').value = p;
    }
    
    async function processText() {
      const apiKey = localStorage.getItem('apiKey');
      if (!apiKey) {
        alert('Please save your API key first!');
        return;
      }
      if (!currentText) {
        alert('Please get copied text first!');
        return;
      }
      
      const prompt = document.getElementById('prompt').value;
      document.getElementById('result').innerHTML = '<div class="status info">Processing with Claude...</div>';
      
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'claude-3-haiku-20240307',
            max_tokens: 1024,
            messages: [{
              role: 'user',
              content: prompt + '\\n\\nText: ' + currentText
            }]
          })
        });
        
        const data = await response.json();
        if (response.ok) {
          resultText = data.content[0].text;
          document.getElementById('result').innerHTML = '<strong>Result:</strong><br>' + resultText;
          document.getElementById('copyBtn').style.display = 'block';
        } else {
          document.getElementById('result').innerHTML = '<div class="status error">Error: ' + (data.error?.message || 'Unknown') + '</div>';
        }
      } catch (err) {
        document.getElementById('result').innerHTML = '<div class="status error">Error: ' + err.message + '</div>';
      }
    }
    
    function copyResult() {
      clipboard.writeText(resultText);
      document.getElementById('copyBtn').textContent = '✅ Copied!';
      setTimeout(() => {
        document.getElementById('copyBtn').textContent = '📋 Copy Result';
      }, 2000);
    }
  </script>
</body>
</html>
