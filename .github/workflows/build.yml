name: Build DMG

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build DMG
        run: npm run build
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-writing-assistant-dmg
          path: dist/*.dmg
